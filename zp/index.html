<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="description" content="杨顺超的开源项目作品集，涵盖前端、跨端、AI工具与桌面应用开发。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --container-width: 1200px;

            /* 纯白主题 */
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f1f3f4;
            --bg-card: #ffffff;
            --border-color: #e5e7eb;
            --border-color-hover: #d1d5db;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;

            --accent-cyan: #0891b2;
            --accent-blue: #2563eb;
            --accent-emerald: #059669;
            --accent-amber: #d97706;
            --accent-red: #dc2626;
            --accent-green: #16a34a;

            --gradient-primary: linear-gradient(135deg, #0891b2 0%, #2563eb 100%);

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 2px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

            --transition-fast: 0.15s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 15px; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; outline: none; }

        .container {
            width: 100%;
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .logo {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .logo span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 5px 10px;
            border-radius: 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            transition: var(--transition-fast);
        }
        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--border-color-hover);
        }
        .back-link i { width: 14px; height: 14px; }

        /* Hero */
        .hero {
            padding: 12px 0 8px;
        }
        .hero-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .hero-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hero h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            white-space: nowrap;
        }
        .hero h1 span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-left p {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .stats-bar .num {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-primary);
            display: block;
            line-height: 1.1;
        }
        .stats-bar .lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Filters */
        .filters {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .filter-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-color-hover);
        }
        .filter-btn.active {
            background: var(--gradient-primary);
            color: #ffffff;
            border-color: transparent;
        }

        /* Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        /* Card - 紧凑 */
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }
        .project-card:hover {
            border-color: var(--border-color-hover);
            box-shadow: var(--shadow-md);
        }
        .project-card[data-demo="true"] {
            border-left: 2px solid var(--accent-green);
        }
        .project-card[data-demo="true"]::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 7px;
            height: 7px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.15);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .card-lang-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .card-lang {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .card-title {
            font-size: 0.92rem;
            font-weight: 700;
            margin-bottom: 5px;
            line-height: 1.3;
            color: var(--text-primary);
        }
        .card-desc {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }
        .tag {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: auto;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.72rem;
            transition: all var(--transition-fast);
            flex: 1;
            min-height: 32px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--gradient-primary);
            color: #ffffff;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            color: var(--text-primary);
            border-color: var(--border-color-hover);
            background: var(--bg-tertiary);
        }
        .btn i { width: 12px; height: 12px; }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
            padding: 16px 0;
            margin-top: 32px;
            text-align: center;
        }
        .footer p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            html { font-size: 14px; }
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
        @media (max-width: 640px) {
            .hero-inner {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .hero-left { align-items: center; }
            .hero h1 { font-size: 1.2rem; }
            .hero-left p { font-size: 0.78rem; }
            .stats-bar { gap: 16px; padding: 5px 14px; }
        }
        @media (max-width: 375px) {
            .container { padding: 0 12px; }
            .header { height: 48px; }
            .hero { padding: 10px 0 8px; }
            .hero h1 { font-size: 1.05rem; }
            .hero-left p { font-size: 0.72rem; }
            .stats-bar { gap: 14px; padding: 5px 12px; }
            .stats-bar .num { font-size: 1rem; }
            .stats-bar .lbl { font-size: 0.65rem; }
            .filters { gap: 4px; margin-bottom: 12px; }
            .filter-btn { padding: 4px 10px; font-size: 0.7rem; }
            .projects-grid { gap: 10px; }
            .project-card { padding: 10px; border-radius: 8px; }
            .card-title { font-size: 0.82rem; }
            .card-desc { font-size: 0.72rem; -webkit-line-clamp: 2; }
            .tag { font-size: 0.55rem; padding: 1px 4px; }
            .btn { padding: 5px 8px; font-size: 0.65rem; min-height: 30px; }
            .back-link span { display: none; }
            .footer { padding: 12px 0; margin-top: 24px; }
        }
    </style>
</head>

        const grid = document.getElementById('projectsGrid');
        const statTotal = document.getElementById('statTotal');
        const statDemo = document.getElementById('statDemo');
        const statLang = document.getElementById('statLang');

        const uniqueLangs = new Set(projects.map(p => p.lang));
        statTotal.textContent = projects.length;
        statDemo.textContent = projects.filter(p => p.demoUrl).length;
        statLang.textContent = uniqueLangs.size;

        function renderProjects(filter = 'all') {
            grid.innerHTML = '';
            let filtered = projects;

            if (filter === 'demo') {
                filtered = projects.filter(p => p.demoUrl);
            } else if (filter !== 'all') {
                filtered = projects.filter(p => p.category && p.category.includes(filter));
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.dataset.demo = !!p.demoUrl;
                card.dataset.category = (p.category || []).join(',');

                const tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
                const demoBtn = p.demoUrl
                    ? `<a href="${p.demoUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-primary"><i data-lucide="globe"></i> 体验</a>`
                    : '';
                const githubBtn = `<a href="${p.url}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary"><i data-lucide="github"></i> 源码</a>`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-lang-dot" style="background:${p.langColor}"></span>
                        <span class="card-lang">${p.lang}</span>
                    </div>
                    <h3 class="card-title">${p.name}</h3>
                    <p class="card-desc">${p.desc}</p>
                    <div class="card-tags">${tagsHtml}</div>
                    <div class="card-actions">
                        ${githubBtn}
                        ${demoBtn}
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProjects(btn.dataset.filter);
            });
        });

        renderProjects();
    </script>
</body>
