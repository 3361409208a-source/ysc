<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>项目作品集 | 杨顺超</title>
    <meta name="description" content="杨顺超的开源项目作品集，涵盖前端、跨端、AI工具与桌面应用开发。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --container-width: 1200px;

            --bg-primary: #090d16;
            --bg-secondary: #0f172a;
            --bg-tertiary: #1e293b;
            --bg-card: rgba(15, 23, 42, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-green: #22c55e;

            --gradient-primary: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            --gradient-hover: linear-gradient(135deg, #0891b2 0%, #2563eb 100%);

            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.4);
            --shadow-glow-cyan: 0 0 25px rgba(6, 182, 212, 0.2);

            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg-primary: #ffffff;
            --bg-secondary: #fcfcfd;
            --bg-tertiary: #f3f4f6;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.05);
            --border-color-hover: rgba(0, 0, 0, 0.09);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            --accent-cyan: #0891b2;
            --accent-blue: #2563eb;
            --accent-emerald: #059669;
            --accent-amber: #d97706;

            --gradient-primary: linear-gradient(135deg, #0891b2 0%, #2563eb 100%);
            --gradient-hover: linear-gradient(135deg, #0e7490 0%, #1d4ed8 100%);

            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.1);
            --shadow-glow-cyan: 0 0 25px rgba(8, 145, 178, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color var(--transition-normal), color var(--transition-normal);
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; outline: none; }

        .container {
            width: 100%;
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: var(--bg-card);
            backdrop-filter: saturate(180%) blur(15px);
            -webkit-backdrop-filter: saturate(180%) blur(15px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            transition: background-color var(--transition-normal), border-color var(--transition-normal);
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: var(--transition-fast);
        }
        .theme-toggle:hover {
            background-color: var(--bg-primary);
            border-color: var(--border-color-hover);
        }
        .theme-toggle .sun-icon { display: none; }
        .theme-toggle .moon-icon { display: block; }
        body.light-theme .theme-toggle .sun-icon { display: block; }
        body.light-theme .theme-toggle .moon-icon { display: none; }
        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 10px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            transition: var(--transition-fast);
        }
        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--border-color-hover);
        }
        .back-link i { width: 16px; height: 16px; }

        /* Hero */
        .hero {
            padding: 60px 0 40px;
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }
        .hero h1 span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 560px;
            margin: 0 auto 32px;
        }
        .stats-bar {
            display: inline-flex;
            gap: 32px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 16px 32px;
            border-radius: 16px;
        }
        .stats-bar .num {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            display: block;
            line-height: 1;
        }
        .stats-bar .lbl {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Filters */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .filter-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-color-hover);
        }
        .filter-btn.active {
            background: var(--gradient-primary);
            color: #ffffff;
            border-color: transparent;
        }

        /* Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* Card */
        .project-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal);
        }
        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-color-hover);
            box-shadow: var(--shadow-glow-cyan);
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        .project-card:hover::before {
            opacity: 1;
        }
        .project-card[data-demo="true"] {
            border-color: rgba(6, 182, 212, 0.2);
        }
        .project-card[data-demo="true"]::after {
            content: '可体验';
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-green);
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .card-lang-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .card-lang {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }
        .tag {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            background-color: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 6px;
        }
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-normal);
            flex: 1;
            justify-content: center;
            min-height: 40px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--gradient-primary);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: var(--gradient-hover);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
        }
        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background-color: var(--bg-primary);
            border-color: var(--border-color-hover);
        }
        .btn i { width: 14px; height: 14px; }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            padding: 32px 0;
            margin-top: 60px;
            text-align: center;
        }
        .footer p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            html { font-size: 15px; }
            .hero { padding: 48px 0 32px; }
            .hero h1 { font-size: 2rem; }
            .stats-bar { gap: 24px; padding: 14px 24px; }
            .projects-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
        @media (max-width: 375px) {
            .container { padding: 0 16px; }
            .hero { padding: 36px 0 24px; }
            .hero h1 { font-size: 1.6rem; letter-spacing: -1px; }
            .hero p { font-size: 0.9rem; margin-bottom: 20px; }
            .stats-bar {
                gap: 20px;
                padding: 12px 20px;
                border-radius: 12px;
            }
            .stats-bar .num { font-size: 1.3rem; }
            .stats-bar .lbl { font-size: 0.7rem; }
            .filter-btn { padding: 8px 14px; font-size: 0.8rem; }
            .project-card { padding: 20px; border-radius: 16px; }
            .card-title { font-size: 1.05rem; }
            .card-desc { font-size: 0.85rem; -webkit-line-clamp: 3; }
            .btn { padding: 12px 14px; font-size: 0.8rem; min-height: 44px; }
            .footer { padding: 24px 0; margin-top: 40px; }
            .back-link { padding: 6px 10px; font-size: 0.8rem; }
            .back-link span { display: none; }
        }
    </style>
</head>

                body.classList.replace('dark-theme', 'light-theme');

        // Render projects
        const grid = document.getElementById('projectsGrid');
        const statTotal = document.getElementById('statTotal');
        const statDemo = document.getElementById('statDemo');
        const statLang = document.getElementById('statLang');

        const uniqueLangs = new Set(projects.map(p => p.lang));
        statTotal.textContent = projects.length;
        statDemo.textContent = projects.filter(p => p.demoUrl).length;
        statLang.textContent = uniqueLangs.size;

        function renderProjects(filter = 'all') {
            grid.innerHTML = '';
            let filtered = projects;

            if (filter === 'demo') {
                filtered = projects.filter(p => p.demoUrl);
            } else if (filter !== 'all') {
                filtered = projects.filter(p => p.category && p.category.includes(filter));
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.dataset.demo = !!p.demoUrl;
                card.dataset.category = (p.category || []).join(',');

                const tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
                const demoBtn = p.demoUrl
                    ? `<a href="${p.demoUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-primary"><i data-lucide="globe"></i> 体验</a>`
                    : '';
                const githubBtn = `<a href="${p.url}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary"><i data-lucide="github"></i> 源码</a>`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-lang-dot" style="background:${p.langColor}"></span>
                        <span class="card-lang">${p.lang}</span>
                    </div>
                    <h3 class="card-title">${p.name}</h3>
                    <p class="card-desc">${p.desc}</p>
                    <div class="card-tags">${tagsHtml}</div>
                    <div class="card-actions">
                        ${githubBtn}
                        ${demoBtn}
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        // Filter buttons
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProjects(btn.dataset.filter);
            });
        });

        renderProjects();
    </script>
